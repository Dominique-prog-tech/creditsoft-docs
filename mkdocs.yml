site_name: CreditSoft Documentatie
site_description: Officiële handleiding voor CreditSoft
site_author: Dominique
site_url: https://docs.creditsoft.be/
copyright: >
  CreditSoft &copy; 2026 — eigendom van
  <a href="https://www.adm-concept.be" target="_blank" rel="noopener">ADM-Concept</a>.
  Alle rechten voorbehouden.

theme:
  name: material
  language: nl
  logo: images/logo.svg
  favicon: images/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Schakel naar donkere modus
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Schakel naar lichte modus
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search:
      lang:
        - nl
        - fr
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: nl
          default: true
          name: Nederlands
          build: true
          site_name: CreditSoft Documentatie
          site_description: Officiële handleiding voor CreditSoft
        - locale: fr
          name: Français
          build: true
          site_name: CreditSoft Documentation
          site_description: Manuel officiel de CreditSoft
          copyright: >
            CreditSoft &copy; 2026 — propriété d'<a href="https://www.adm-concept.be" target="_blank" rel="noopener">ADM-Concept</a>.
            Tous droits réservés.
          theme:
            language: fr
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: Passer en mode sombre
              - scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: Passer en mode clair
          nav_translations:
            Home: Accueil
            Aan de slag: Premiers pas
            Installatie: Installation
            Eerste aanmelding: Première connexion
            Interface-overzicht: Aperçu de l'interface
            Dashboard: Tableau de bord
            Kredietdossiers: Dossiers de crédit
            Overzicht: Aperçu
            Nieuw dossier aanmaken: Créer un nouveau dossier
            Dossier bewerken: Modifier le dossier
            Documenten beheren: Gérer les documents
            Workflow en statussen: Workflow et statuts
            In afwerking: En finalisation
            In te dienen dossiers: Dossiers à soumettre
            Opvolging na akte: Suivi après acte
            Contracten overzicht: Aperçu des contrats
            LOA overzicht: Aperçu LOA
            SSV overzicht: Aperçu SSV
            CRM: CRM
            Bedrijven: Entreprises
            Contacten: Contacts
            Accountants: Comptables
            Immokantoren: Agences immobilières
            Notarissen: Notaires
            Schatters: Estimateurs
            Panden: Biens immobiliers
            CRM-rapporten: Rapports CRM
            Kredieten-beheer: Gestion des crédits
            Dashboard kredieten: Tableau de bord crédits
            "Commissieschema's": Barèmes de commission
            Commissiebeheer: Gestion des commissions
            Commissie-controle: Contrôle des commissions
            Documenten valideren: Valider les documents
            Tussenpersonen: Intermédiaires
            Financiële instellingen: Institutions financières
            Verzekeringsmaatschappijen: Compagnies d'assurance
            Schattingen: Estimations
            Statistiek portefeuille: Statistiques portefeuille
            Rapporten kredieten: Rapports crédits
            Taken: Tâches
            Takenbeheer: Gestion des tâches
            Werk: Travail
            Telefoons: Téléphones
            Agenda: Agenda
            Archief: Archives
            Groepsmail: E-mail groupé
            Beheer: Configuration
            Bedrijfsprofiel: Profil d'entreprise
            Algemene instellingen: Paramètres généraux
            Stamgegevens: Données de base
            Kredietdocumenten: Documents de crédit
            Nummering: Numérotation
            Verlof en feestdagen: Congés et jours fériés
            Mail accounts: Comptes mail
            Mail templates: Modèles de mail
            Personeel: Personnel
            Portaal-instellingen: Paramètres du portail
            Mijn gebruiker: Mon utilisateur
